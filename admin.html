<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pirate Quest - Admin Panel</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        /* UI HUD Layout */
        #game-hud {
            position: fixed;
            top: 10px; left: 10px; right: 10px;
            z-index: 9999;
            font-family: Arial, sans-serif;
            pointer-events: none;
        }
        .hud-card {
            background: rgba(22, 36, 71, 0.85);
            color: #fff;
            padding: 10px 15px;
            border-radius: 8px;
            display: inline-block;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            font-weight: bold;
        }
        #score-display { float: right; background: rgba(228, 63, 90, 0.9); }

        /* Pop-up Modals / Cards styling reverted to match your original theme layout */
        .modal-content {
            background-color: #162447;
            color: white;
            margin: 15% auto;
            padding: 25px;
            border-radius: 12px;
            width: 80%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            font-family: Arial, sans-serif;
        }
        .modal-btn {
            background: #e43f5a;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
            font-weight: bold;
        }
        .modal-btn:hover {
            background: #b93246;
        }
        ul {
            list-style: none;
            padding: 0;
            text-align: left;
            margin: 20px 0;
        }
        li {
            background: rgba(228, 63, 90, 0.2);
            padding: 12px;
            margin: 8px 0;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            border: 1px solid rgba(228, 63, 90, 0.4);
        }
    </style>
</head>
<body style="background-color: #0f172a; margin: 0; padding: 20px;">

    <div class="modal-content" style="margin-top: 50px;">
        <h2 id="modalTitle" style="color: #e43f5a;">☠️ Admin Command Deck </h2>
        <p id="modalMessage">Live Leaderboard Standings:</p>
        
        <ul id="leaderboard-list">
            <li>Loading standings...</li>
        </ul>

        <button class="modal-btn" onclick="resetEntireGame()">Reset Entire Game</button>
    </div>

    <script>
        const SUPABASE_URL = "https://vkdilynwfkkmmmjiyxyw.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZrZGlseW53ZmtrbW1taml5eHl3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MDA5NDUsImV4cCI6MjA5Nzk3Njk0NX0.AY267mdl4i6fcJuqNx1J3ANs-mNRHcydZvwD75OuAA0";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function fetchLeaderboard() {
            const listContainer = document.getElementById('leaderboard-list');
            if (!listContainer) return;

            const { data, error } = await supabaseClient
                .from('teams')
                .select('team_name, score')
                .order('score', { ascending: false });

            if (error) {
                console.error("Error fetching standings:", error);
                return;
            }

            listContainer.innerHTML = "";

            if (data.length === 0) {
                listContainer.innerHTML = "<li style='justify-content: center;'>No active pirate crews found.</li>";
                return;
            }

            data.forEach((team, index) => {
                const li = document.createElement('li');
                li.innerHTML = `<span>#${index + 1} ${team.team_name}</span> <strong>${team.score} pts</strong>`;
                listContainer.appendChild(li);
            });
        }

        // FIXED: Deletes child records from scan_logs before clearing teams
        async function resetEntireGame() {
            if (!confirm("⚠️ Are you absolutely sure you want to wipe the game? This will instantly boot all logged-in devices back to registration and erase points!")) {
                return;
            }

            try {
                // Step 1: Wipe the dependent scan logs first to clear constraints
                const { error: logsError } = await supabaseClient
                    .from('scan_logs')
                    .delete()
                    .neq('team_id', '_none_');

                if (logsError) throw logsError;

                // Step 2: Now we can safely wipe the teams without a 409 conflict
                const { error: teamError } = await supabaseClient
                    .from('teams')
                    .delete()
                    .neq('team_id', '_none_');

                if (teamError) throw teamError;

                alert("🏴‍☠️ Database wiped clean successfully! Devices will auto-reset within 10 seconds.");
                fetchLeaderboard();

            } catch (err) {
                console.error("Wipe failed:", err);
                alert("Wipe error: " + err.message);
            }
        }

        fetchLeaderboard();
        setInterval(fetchLeaderboard, 5000);
    </script>
</body>
</html>
