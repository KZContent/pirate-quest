<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pirate Quest - Admin Panel</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #1a1a2e;
            color: #fff;
            padding: 20px;
            text-align: center;
        }
        .admin-card {
            background: #162447;
            padding: 30px;
            border-radius: 15px;
            max-width: 500px;
            margin: 40px auto;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }
        h1 { color: #e43f5a; }
        ul {
            list-style: none;
            padding: 0;
            text-align: left;
            margin: 20px 0;
        }
        li {
            background: #1f4068;
            padding: 12px;
            margin: 8px 0;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
        }
        .btn-reset {
            background: #e43f5a;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            margin-top: 20px;
        }
        .btn-reset:hover { background: #b93246; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="admin-card">
        <h1>☠️ Game Master Command Deck ☠️</h1>
        <p>Live Leaderboard Standings:</p>
        
        <ul id="leaderboard-list">
            <li>Loading standings...</li>
        </ul>

        <button class="btn-reset" onclick="resetEntireGame()">Reset Entire Game & De-auth All Devices</button>
    </div>

    <script>
        const SUPABASE_URL = "https://vkdilynwfkkmmmjiyxyw.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZrZGlseW53ZmtrbW1taml5eHl3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MDA5NDUsImV4cCI6MjA5Nzk3Njk0NX0.AY267mdl4i6fcJuqNx1J3ANs-mNRHcydZvwD75OuAA0";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function fetchLeaderboard() {
            const listContainer = document.getElementById('leaderboard-list');
            if (!listContainer) return;

            const { data, error } = await supabaseClient
                .from('teams')
                .select('team_name, score')
                .order('score', { ascending: false });

            if (error) {
                console.error("Error fetching standings:", error);
                return;
            }

            listContainer.innerHTML = "";

            if (data.length === 0) {
                listContainer.innerHTML = "<li style='justify-content: center;'>No active pirate crews found.</li>";
                return;
            }

            data.forEach((team, index) => {
                const li = document.createElement('li');
                li.innerHTML = `<span>#${index + 1} ${team.team_name}</span> <strong>${team.score} pts</strong>`;
                listContainer.appendChild(li);
            });
        }

        // FIXED: Complete database wipe + user device kick logic
        async function resetEntireGame() {
            if (!confirm("⚠️ Are you absolutely sure you want to wipe the game? This will instantly boot all logged-in devices back to registration and erase points!")) {
                return;
            }

            try {
                // 1. Clear out the team tracks completely using a universal RPC reset fallback or direct filter 
                // Using .neq('team_id', '_none_') ensures we clear everything safely without running into URL formatting bugs
                const { error: teamError } = await supabaseClient
                    .from('teams')
                    .delete()
                    .neq('team_id', '_none_');

                if (teamError) throw teamError;

                alert("🏴‍☠️ Database wiped clean! Devices will clear automatically on their next database check loop.");
                fetchLeaderboard();

            } catch (err) {
                console.error("Wipe failed:", err);
                alert("Wipe error: " + err.message);
            }
        }

        fetchLeaderboard();
        setInterval(fetchLeaderboard, 5000);
    </script>
</body>
</html>
