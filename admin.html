<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pirate Quest - Master Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #121214;
            color: #e2e8f0;
            padding: 20px;
            margin: 0;
        }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { color: #e43f5a; border-bottom: 2px solid #162447; padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-top: 20px; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
        .card {
            background: #162447;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        h2 { margin-top: 0; color: #4dff88; font-size: 1.2rem; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #1f4068;
        }
        th { background-color: #1f4068; color: #fff; }
        .status-dot {
            height: 10px; width: 10px;
            background-color: #4dff88;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }
        .btn-danger {
            background: #e43f5a;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 15px;
        }
        .btn-danger:hover { background: #b93246; }
        .log-box {
            background: #121214;
            padding: 10px;
            border-radius: 6px;
            height: 300px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 13px;
            color: #a0aec0;
        }
        .log-entry { margin-bottom: 8px; border-bottom: 1px solid #162447; padding-bottom: 4px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>☠️ Pirate Quest - Master Control Deck ☠️</h1>
        
        <div class="grid">
            <div class="card">
                <h2>Leaderboard (Real-time Scores & Pieces)</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Status</th>
                            <th>Team Name</th>
                            <th>Score</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body">
                        <tr><td colspan="3">Waiting for teams to join...</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="card">
                <h2>Game Controls</h2>
                <p style="font-size: 14px; color: #a0aec0;">Use this button at the end of a round to wipe scores and open all markers up again.</p>
                <button class="btn-danger" onclick="resetGame()">🔄 Reset Entire Game</button>
                
                <h2 style="margin-top: 30px; color: #ffb703;">Live Activity Feed</h2>
                <div class="log-box" id="log-box">
                    <div class="log-entry">[System]: Awaiting connection...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Supabase configuration
        const SUPABASE_URL = "https://vkdilynwfkkmmmjiyxyw.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZrZGlseW53ZmtrbW1taml5eHl3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MDA5NDUsImV4cCI6MjA5Nzk3Njk0NX0.AY267mdl4i6fcJuqNx1J3ANs-mNRHcydZvwD75OuAA0";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Run updates every 3 seconds to keep things ultra-lightweight but highly reactive
        setInterval(updateDashboard, 3000);
        updateDashboard();

        async function updateDashboard() {
            // 1. Fetch Leaderboard & Teams Profile
            const { data: teams, error: tErr } = await supabase
                .from('teams')
                .select('*')
                .order('score', { ascending: false });

            if (teams) {
                const tbody = document.getElementById('leaderboard-body');
                if(teams.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="3">No teams registered yet.</td></tr>`;
                } else {
                    tbody.innerHTML = teams.map(team => `
                        <tr>
                            <td><span class="status-dot"></span> Active</td>
                            <td><strong>${team.team_name}</strong></td>
                            <td><span style="color: #4dff88; font-weight:bold;">${team.score} pts</span></td>
                        </tr>
                    `).join('');
                }
            }

            // 2. Fetch Recent Live Scan Logs for Feed Display
            const { data: logs, error: lErr } = await supabase
                .from('scan_logs')
                .select('*, teams(team_name)')
                .order('scanned_at', { ascending: false })
                .limit(15);

            if (logs) {
                const logBox = document.getElementById('log-box');
                logBox.innerHTML = logs.map(log => {
                    let teamName = log.teams ? log.teams.team_name : 'Unknown Team';
                    let actionText = log.marker_type === 'waypoint' ? `scanned Waypoint #${log.marker_id}` : 
                                     log.marker_type === 'piece' ? `CLAIMED Ship Piece #${log.marker_id}!` : 
                                     `PENALTY! Tried to scan Piece #${log.marker_id} without Waypoint.`;
                    let color = log.points_awarded > 0 ? '#4dff88' : '#e43f5a';
                    return `<div class="log-entry"><strong>${teamName}</strong> ${actionText} (<span style="color: ${color}">${log.points_awarded} pts</span>)</div>`;
                }).join('');
            }
        }

        // Master Wipe Button
        async function resetGame() {
            if (!confirm("⚠️ WARNING: This will permanently wipe all team scores, delete logs, and reset all 30 markers back to 'open'. Are you sure?")) {
                return;
            }

            // Clean logs, clear active team slots, and reset map locks back to true base values
            const { error: err1 } = await supabase.from('scan_logs').delete().neq('id', 0);
            const { error: err2 } = await supabase.from('teams').delete().neq('score', -999);
            const { error: err3 } = await supabase.from('game_markers').update({ waypoint_status: 'open', piece_status: 'open' }).neq('marker_id', '00');

            alert("Game Reset Complete! All configurations are restored back to zero.");
            updateDashboard();
        }
    </script>
</body>
</html>
